<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}
.input-box{
    display:flex;
    gap:10px;
}
input{
    flex:1;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
}
button{
    padding:12px 18px;
    border:none;
    background:#667eea;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#5648c5;
}
ul{
    list-style:none;
    margin-top:20px;
}
li{
    background:#f5f5f5;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
li.completed{
    text-decoration:line-through;
    color:gray;
}
.actions button{
    margin-left:5px;
    padding:6px 10px;
    font-size:12px;
}
.delete{
    background:#ff4d4d;
}
.complete{
    background:#28a745;
}
</style>
</head>
<body>

<div class="container">
    <h1>Todo List</h1>
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
function addTask(){
    let input = document.getElementById("taskInput");
    let task = input.value.trim();

    if(task === ""){
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
        <span>${task}</span>
        <div class="actions">
            <button class="complete" onclick="toggleComplete(this)">Done</button>
            <button class="delete" onclick="deleteTask(this)">Delete</button>
        </div>
    `;

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}

function deleteTask(btn){
    btn.parentElement.parentElement.remove();
}

function toggleComplete(btn){
    btn.parentElement.parentElement.classList.toggle("completed");
}
</script>

</body>
</html>
